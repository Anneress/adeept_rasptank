<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Client</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #1f2933 0%, #0f1720 100%);
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            gap: 24px;
        }

        h1 {
            color: #e8edf2;
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            margin: 0;
        }

        #gamepad {
            display: flex;
            touch-action: none;
        }

        #gameCanvas {
            touch-action: none;
            cursor: grab;
        }

        #gameCanvas:active {
            cursor: grabbing;
        }

        #tiltControls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            touch-action: none;
        }

        #tiltControls button {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: linear-gradient(180deg, #3a4750 0%, #232c33 100%);
            color: #e8edf2;
            font-size: 1.5rem;
            cursor: pointer;
        }

        #tiltControls button:active {
            background: linear-gradient(180deg, #2f7dd6 0%, #1f5fa8 100%);
        }

        #controls {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        @media (max-width: 640px) {
            #controls {
                flex-direction: column;
                align-items: flex-start;
                width: 100%;
                padding: 0 16px;
                box-sizing: border-box;
                gap: 16px;
            }

            #tiltControls {
                flex-direction: row;
            }

            #gamepad {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <h1>Rasptank Control</h1>
    <div id="controls">
        <div id="tiltControls">
            <button id="tiltUp" aria-label="Camera up">&#9650;</button>
            <button id="tiltDown" aria-label="Camera down">&#9660;</button>
        </div>
        <div id="gamepad"></div>
    </div>
    <script src="virtual_joystick.js" type="module"></script>
</body>
</html>
