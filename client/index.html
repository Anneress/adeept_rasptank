<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Client</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #1f2933 0%, #0f1720 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #videoStream {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
            z-index: 0;
            pointer-events: none;
        }

        #videoToggle {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 2;
            pointer-events: auto;
            padding: 10px 16px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.25);
            background: rgba(35, 44, 51, 0.45);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            color: #e8edf2;
            font-size: 0.9rem;
            cursor: pointer;
        }

        #videoToggle[aria-pressed="true"] {
            background: linear-gradient(180deg, rgba(47, 125, 214, 0.5) 0%, rgba(31, 95, 168, 0.5) 100%);
        }

        #gamepad {
            display: flex;
            touch-action: none;
        }

        #gameCanvas {
            touch-action: none;
            cursor: grab;
            border-radius: 50%;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        #gameCanvas:active {
            cursor: grabbing;
        }

        #tiltControls {
            display: flex;
            flex-direction: row;
            gap: 12px;
            touch-action: none;
        }

        #tiltControls button {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.25);
            background: linear-gradient(180deg, rgba(58, 71, 80, 0.5) 0%, rgba(35, 44, 51, 0.5) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.15), inset 0 -3px 6px rgba(0, 0, 0, 0.25);
            color: #e8edf2;
            font-size: 1.5rem;
            cursor: pointer;
        }

        #tiltControls button:active {
            background: linear-gradient(180deg, rgba(47, 125, 214, 0.55) 0%, rgba(31, 95, 168, 0.55) 100%);
        }

        #controls {
            position: fixed;
            right: 16px;
            bottom: 16px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        /* Above this breakpoint (see BREAKPOINT in virtual_joystick.ts), the
           tilt buttons move from stacked above the joystick to a vertical
           pair beside it, centered on it. */
        @media (min-width: 641px) {
            #controls {
                flex-direction: row;
                align-items: center;
            }

            #tiltControls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <img id="videoStream" alt="Camera feed">
    <button id="videoToggle" aria-pressed="false">Video: Aus</button>
    <div id="controls">
        <div id="tiltControls">
            <button id="tiltUp" aria-label="Camera up">&#9650;</button>
            <button id="tiltDown" aria-label="Camera down">&#9660;</button>
        </div>
        <div id="gamepad"></div>
    </div>
    <script src="virtual_joystick.js" type="module"></script>
    <script src="video_stream.js" type="module"></script>
</body>
</html>
