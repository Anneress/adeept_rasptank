<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Client</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #1f2933 0%, #0f1720 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #videoStream {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
            z-index: 0;
            pointer-events: none;
        }

        #videoToggle {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 2;
            pointer-events: auto;
            padding: 10px 16px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.25);
            background: rgba(35, 44, 51, 0.45);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            color: #e8edf2;
            font-size: 0.9rem;
            cursor: pointer;
        }

        #videoToggle[aria-pressed="true"] {
            background: linear-gradient(180deg, rgba(47, 125, 214, 0.5) 0%, rgba(31, 95, 168, 0.5) 100%);
        }

        #gamepad {
            display: flex;
            touch-action: none;
        }

        #gameCanvas {
            touch-action: none;
            cursor: grab;
            border-radius: 50%;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        #gameCanvas:active {
            cursor: grabbing;
        }

        #tiltControls {
            display: flex;
            flex-direction: row;
            gap: 12px;
            touch-action: none;
        }

        #tiltControls button {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.25);
            background: linear-gradient(180deg, rgba(58, 71, 80, 0.5) 0%, rgba(35, 44, 51, 0.5) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.15), inset 0 -3px 6px rgba(0, 0, 0, 0.25);
            color: #e8edf2;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        #tiltControls button:active {
            background: linear-gradient(180deg, rgba(47, 125, 214, 0.55) 0%, rgba(31, 95, 168, 0.55) 100%);
        }

        #tiltControls button svg {
            width: 28px;
            height: 28px;
            pointer-events: none;
        }

        #tiltIcon {
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            color: #e8edf2;
            filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.6));
        }

        #tiltIcon svg {
            width: 22px;
            height: 22px;
        }

        #controls {
            position: fixed;
            right: 16px;
            bottom: 16px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        /* Above this breakpoint (see BREAKPOINT in virtual_joystick.ts), the
           tilt buttons move from stacked above the joystick to a vertical
           pair beside it, centered on it. */
        @media (min-width: 641px) {
            #controls {
                flex-direction: row;
                align-items: center;
            }

            #tiltControls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <img id="videoStream" alt="Camera feed">
    <button id="videoToggle" aria-pressed="false">Video: Aus</button>
    <div id="controls">
        <div id="tiltControls">
            <button id="tiltUp" aria-label="Camera up">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6" /></svg>
            </button>
            <span id="tiltIcon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.75 12h3.632a1 1 0 0 1 .894 1.447l-2.034 4.069a1 1 0 0 1-1.708.134l-2.124-2.97" /><path d="M17.106 9.053a1 1 0 0 1 .447 1.341l-3.106 6.211a1 1 0 0 1-1.342.447L3.61 12.3a2.92 2.92 0 0 1-1.3-3.91L3.69 5.6a2.92 2.92 0 0 1 3.92-1.3z" /><path d="M2 19h3.76a2 2 0 0 0 1.8-1.1L9 15" /><path d="M2 21v-4" /><path d="M7 9h.01" /></svg>
            </span>
            <button id="tiltDown" aria-label="Camera down">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6" /></svg>
            </button>
        </div>
        <div id="gamepad"></div>
    </div>
    <script src="virtual_joystick.js" type="module"></script>
    <script src="video_stream.js" type="module"></script>
</body>
</html>
