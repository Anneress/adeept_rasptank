<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Client</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(180deg, #1f2933 0%, #0f1720 100%);
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            gap: 24px;
        }

        h1 {
            color: #e8edf2;
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            margin: 0;
        }

        #gamepad {
            display: flex;
            touch-action: none;
        }

        #gameCanvas {
            touch-action: none;
            cursor: grab;
        }

        #gameCanvas:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>
    <h1>Rasptank Control</h1>
    <div id="gamepad"></div>
    <script src="virtual_joystick.js" type="module"></script>
</body>
</html>
